name: Windows MSVC CI

on:
  push:
    branches:
      - dev
      - master
  pull_request:
    branches:
      - dev
      - master
  workflow_dispatch:

jobs:
  build-test-samples:
    runs-on: windows-2022
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup MSVC environment
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path -LiteralPath $vswhere)) {
              throw "vswhere.exe was not found at: $vswhere"
          }

          $installationPath = & $vswhere `
              -latest `
              -products "*" `
              -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
              -property installationPath
          $installationPath = [string]$installationPath
          if ([string]::IsNullOrWhiteSpace($installationPath)) {
              throw "No Visual Studio installation with x64 MSVC tools was found."
          }

          $vcvars = Join-Path $installationPath "VC\Auxiliary\Build\vcvars64.bat"
          if (-not (Test-Path -LiteralPath $vcvars)) {
              throw "vcvars64.bat was not found at: $vcvars"
          }

          $exportNames = @(
              "CommandPromptType",
              "DevEnvDir",
              "ExtensionSdkDir",
              "Framework40Version",
              "FrameworkDir",
              "FrameworkDir64",
              "FrameworkVersion",
              "FrameworkVersion64",
              "INCLUDE",
              "LIB",
              "LIBPATH",
              "NETFXSDKDir",
              "Path",
              "UCRTVersion",
              "UniversalCRTSdkDir",
              "VCIDEInstallDir",
              "VCINSTALLDIR",
              "VCToolsInstallDir",
              "VCToolsRedistDir",
              "VCToolsVersion",
              "VisualStudioVersion",
              "WindowsLibPath",
              "WindowsSdkBinPath",
              "WindowsSdkDir",
              "WindowsSDKLibVersion",
              "WindowsSDKVersion"
          )

          $environmentLines = & cmd.exe /s /c "`"$vcvars`" >nul && set"
          foreach ($line in $environmentLines) {
              $separatorIndex = $line.IndexOf("=")
              if ($separatorIndex -le 0) {
                  continue
              }

              $name = $line.Substring(0, $separatorIndex)
              $value = $line.Substring($separatorIndex + 1)
              if (($exportNames -notcontains $name) -and (-not $name.StartsWith("VSCMD_", [System.StringComparison]::OrdinalIgnoreCase))) {
                  continue
              }

              Add-Content -LiteralPath $env:GITHUB_ENV -Encoding UTF8 -Value "$name=$value"
          }

          Write-Host "MSVC x64 environment exported from $vcvars"

      - name: Verify Ninja
        shell: pwsh
        run: ninja --version

      - name: Configure
        shell: pwsh
        run: >
          cmake -S . -B build-msvc-ninja -G "Ninja"
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTING=ON
          -DBUILD_SAMPLES=ON
          -DBUILD_CLI=ON

      - name: Build
        shell: pwsh
        timeout-minutes: 75
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          $buildCommandText = "cmake --build build-msvc-ninja --parallel 4 --verbose"
          Write-Host "Starting $buildCommandText"
          $build = Start-Process `
              -FilePath "cmake" `
              -ArgumentList @("--build", "build-msvc-ninja", "--parallel", "4", "--verbose") `
              -NoNewWindow `
              -PassThru

          try {
              while (-not $build.HasExited) {
                  Write-Host "Build heartbeat: $buildCommandText is still running"
                  Start-Sleep -Seconds 60
                  $build.Refresh()
              }
          } finally {
              if (-not $build.HasExited) {
                  Stop-Process -Id $build.Id -Force -ErrorAction SilentlyContinue
              }
          }

          if ($build.ExitCode -ne 0) {
              throw "Build failed with exit code $($build.ExitCode)."
          }

      - name: Run tests
        shell: pwsh
        run: ctest --test-dir build-msvc-ninja --parallel 2 --output-on-failure --timeout 60

      - name: Run samples and validate generated DOCX files
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"
          Add-Type -AssemblyName System.IO.Compression.FileSystem

          function Assert-Docx {
              param(
                  [Parameter(Mandatory = $true)]
                  [string]$Path
              )

              if (-not (Test-Path -LiteralPath $Path)) {
                  throw "Expected DOCX file was not created: $Path"
              }

              $resolvedPath = (Resolve-Path -LiteralPath $Path).Path
              $archive = [System.IO.Compression.ZipFile]::OpenRead($resolvedPath)
              try {
                  $entries = @($archive.Entries | ForEach-Object { $_.FullName })
              } finally {
                  $archive.Dispose()
              }

              foreach ($requiredEntry in @("[Content_Types].xml", "_rels/.rels", "word/document.xml")) {
                  if ($entries -notcontains $requiredEntry) {
                      throw "DOCX file is missing required entry '$requiredEntry': $Path"
                  }
              }
          }

          Push-Location build-msvc-ninja
          try {
              .\featherdoc_sample1.exe
              .\featherdoc_sample2.exe
              Assert-Docx ".\my_test.docx"

              .\featherdoc_sample_chinese.exe ".\output\sample-chinese\sample_chinese.docx"
              Assert-Docx ".\output\sample-chinese\sample_chinese.docx"

              .\featherdoc_sample_chinese_template.exe ".\output\sample-chinese-template\sample_chinese_invoice_output.docx"
              Assert-Docx ".\output\sample-chinese-template\sample_chinese_invoice_output.docx"

              .\featherdoc_visual_smoke_tables.exe ".\output\visual-smoke\table_visual_smoke.docx"
              Assert-Docx ".\output\visual-smoke\table_visual_smoke.docx"

              .\featherdoc_sample_edit_existing.exe ".\output\sample-edit-existing\edited_existing.docx"
              Assert-Docx ".\output\sample-edit-existing\edited_existing.docx"
          } finally {
              Pop-Location
          }

      - name: Install package and verify external find_package consumer
        shell: pwsh
        run: >
          pwsh -ExecutionPolicy Bypass -File .\scripts\run_install_find_package_smoke.ps1
          -BuildDir build-msvc-ninja
          -InstallDir build-msvc-install
          -ConsumerBuildDir build-msvc-install-consumer
          -Generator "Ninja"
          -Config Release

      - name: Check committed template schema baselines
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          if (-not (Test-Path -LiteralPath .\baselines\template-schema\manifest.json)) {
              Write-Host "No template schema manifest found; skipping baseline checks."
              exit 0
          }

          pwsh -ExecutionPolicy Bypass -File .\scripts\check_template_schema_manifest.ps1 `
              -ManifestPath .\baselines\template-schema\manifest.json `
              -BuildDir build-msvc-ninja `
              -OutputDir output/template-schema-manifest-checks-ci `
              -SkipBuild

      - name: Generate release metadata bundle
        shell: pwsh
        run: >
          pwsh -ExecutionPolicy Bypass -File .\scripts\run_release_candidate_checks.ps1
          -BuildDir build-msvc-ninja
          -InstallDir build-msvc-install
          -ConsumerBuildDir build-msvc-install-consumer
          -Generator "Ninja"
          -SummaryOutputDir output/release-candidate-checks-ci
          -SkipConfigure
          -SkipBuild
          -SkipTests
          -SkipVisualGate
          -SkipReviewTasks

      - name: Generate artifact root start-here note
        shell: pwsh
        run: >
          pwsh -ExecutionPolicy Bypass -File .\scripts\write_release_metadata_start_here.ps1
          -SummaryJson .\output\release-candidate-checks-ci\report\summary.json
          -OutputPath .\RELEASE_METADATA_START_HERE.md
          -ArtifactRootLayout

      - name: Package public release asset preview
        shell: pwsh
        run: >
          pwsh -ExecutionPolicy Bypass -File .\scripts\package_release_assets.ps1
          -SummaryJson .\output\release-candidate-checks-ci\report\summary.json
          -OutputRoot .\output\release-assets-ci
          -AllowIncomplete

      - name: Upload generated sample documents
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: windows-msvc-sample-docx
          path: |
            build-msvc-ninja/my_test.docx
            build-msvc-ninja/output/**/*.docx
            build-msvc-install-consumer/**/*.docx
          if-no-files-found: warn

      - name: Upload installed metadata and release report bundle
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: windows-msvc-release-metadata
          path: |
            RELEASE_METADATA_START_HERE.md
            build-msvc-install/share/FeatherDoc/**
            output/release-candidate-checks-ci/START_HERE.md
            output/release-candidate-checks-ci/report/**
            output/template-schema-manifest-checks-ci/**
          if-no-files-found: warn

      - name: Upload release asset preview bundle
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: windows-msvc-release-assets-preview
          path: |
            output/release-assets-ci/v*/release_assets_manifest.json
            output/release-assets-ci/v*/FeatherDoc-*-msvc-install.zip
            output/release-assets-ci/v*/FeatherDoc-*-visual-validation-gallery.zip
            output/release-assets-ci/v*/FeatherDoc-*-release-evidence.zip
          if-no-files-found: warn
          compression-level: 0
