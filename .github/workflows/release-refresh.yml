name: Release Refresh

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-publish
  cancel-in-progress: false

jobs:
  refresh:
    runs-on:
      - self-hosted
      - windows
    timeout-minutes: 30

    env:
      RELEASE_SUMMARY_JSON: output/release-candidate-checks/report/summary.json
      RELEASE_OUTPUT_ROOT: output/release-assets

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false
          fetch-depth: 0

      - name: Validate release bundle
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          $summaryPath = $env:RELEASE_SUMMARY_JSON
          if (-not (Test-Path -LiteralPath $summaryPath)) {
              throw "Summary JSON not found: $summaryPath. This workflow expects a completed local release-preflight bundle to already exist in the self-hosted runner workspace."
          }

      - name: Refresh GitHub release assets and notes
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          $workspaceRoot = [System.IO.Path]::GetFullPath((Get-Location).Path)
          $resolvedReleaseOutputRoot = [System.IO.Path]::GetFullPath($env:RELEASE_OUTPUT_ROOT)
          $releaseOutputRelativePath = [System.IO.Path]::GetRelativePath($workspaceRoot, $resolvedReleaseOutputRoot)
          $parentDirectoryPrefix = ".." + [System.IO.Path]::DirectorySeparatorChar
          $parentAltDirectoryPrefix = ".." + [System.IO.Path]::AltDirectorySeparatorChar
          $releaseOutputOutsideWorkspace = (
              [System.IO.Path]::IsPathRooted($releaseOutputRelativePath) -or
              $releaseOutputRelativePath -eq ".." -or
              $releaseOutputRelativePath.StartsWith($parentDirectoryPrefix, [System.StringComparison]::Ordinal) -or
              $releaseOutputRelativePath.StartsWith($parentAltDirectoryPrefix, [System.StringComparison]::Ordinal)
          )
          if ($releaseOutputRelativePath -eq "." -or $releaseOutputOutsideWorkspace) {
              throw "Refusing to clean release output outside the workspace: $resolvedReleaseOutputRoot"
          }
          if (Test-Path -LiteralPath $resolvedReleaseOutputRoot) {
              Remove-Item -LiteralPath $resolvedReleaseOutputRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path $resolvedReleaseOutputRoot -Force | Out-Null

          & pwsh `
              -ExecutionPolicy Bypass `
              -File .\scripts\publish_github_release.ps1 `
              -SummaryJson $env:RELEASE_SUMMARY_JSON `
              -OutputRoot $env:RELEASE_OUTPUT_ROOT

      - name: Upload release refresh output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-refresh-output
          path: |
            ${{ env.RELEASE_OUTPUT_ROOT }}/**
          if-no-files-found: warn
