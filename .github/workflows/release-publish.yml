name: Release Publish

on:
  workflow_dispatch:
    inputs:
      allow-ci-artifact-publish:
        description: Allow publishing a CI artifact bundle when Word visual gate was skipped
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on:
      - self-hosted
      - windows
    timeout-minutes: 30

    env:
      RELEASE_SUMMARY_JSON: output/release-candidate-checks/report/summary.json
      RELEASE_OUTPUT_ROOT: output/release-assets

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false
          fetch-depth: 0

      - name: Validate release bundle
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          $summaryPath = $env:RELEASE_SUMMARY_JSON
          if (-not (Test-Path -LiteralPath $summaryPath)) {
              throw "Summary JSON not found: $summaryPath. This workflow expects a completed local release-preflight bundle to already exist in the self-hosted runner workspace."
          }

          $summary = Get-Content -Raw -LiteralPath $summaryPath | ConvertFrom-Json
          $executionStatus = [string]$summary.execution_status
          $visualVerdict = [string]$summary.visual_verdict
          $visualGateStatus = [string]$summary.steps.visual_gate.status
          $allowCiArtifactPublish = [System.Convert]::ToBoolean("${{ inputs.allow-ci-artifact-publish }}")
          $ciArtifactBoundary = $executionStatus -eq "pass" -and
              $visualGateStatus -in @("skipped", "visual_gate_skipped") -and
              $visualVerdict -in @("", "visual_gate_skipped", "pending_manual_review")

          if ($executionStatus -ne "pass") {
              throw "Refusing Release Publish because execution_status is '$executionStatus'."
          }

          if ($allowCiArtifactPublish -and $ciArtifactBoundary) {
              Write-Host "Release Publish is using the explicit CI artifact boundary; Word visual gate remains skipped in the release notes."
          } elseif ([string]::IsNullOrWhiteSpace($visualVerdict) -or $visualVerdict -ne "pass") {
              throw "Refusing Release Publish because visual_verdict is '$visualVerdict'."
          } elseif ($visualGateStatus -in @("skipped", "visual_gate_skipped")) {
              throw "Refusing Release Publish because visual_gate.status is '$visualGateStatus'. Set allow-ci-artifact-publish only for an explicit CI artifact release."
          }

      - name: Publish GitHub release assets and notes
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          $publishArgs = @(
              "-ExecutionPolicy", "Bypass",
              "-File", ".\scripts\publish_github_release.ps1",
              "-SummaryJson", $env:RELEASE_SUMMARY_JSON,
              "-OutputRoot", $env:RELEASE_OUTPUT_ROOT,
              "-Publish"
          )
          if ([System.Convert]::ToBoolean("${{ inputs.allow-ci-artifact-publish }}")) {
              $publishArgs += "-AllowCiArtifactPublish"
          }

          & pwsh @publishArgs

      - name: Upload release publish output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-publish-output
          path: |
            output/release-assets/**
          if-no-files-found: warn
