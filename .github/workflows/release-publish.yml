name: Release Publish

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on:
      - self-hosted
      - windows
    timeout-minutes: 30

    env:
      RELEASE_SUMMARY_JSON: output/release-candidate-checks/report/summary.json
      RELEASE_OUTPUT_ROOT: output/release-assets

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false
          fetch-depth: 0

      - name: Validate release bundle
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          $summaryPath = $env:RELEASE_SUMMARY_JSON
          if (-not (Test-Path -LiteralPath $summaryPath)) {
              throw "Summary JSON not found: $summaryPath. This workflow expects a completed local release-preflight bundle to already exist in the self-hosted runner workspace."
          }

      - name: Publish GitHub release assets and notes
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          & pwsh `
              -ExecutionPolicy Bypass `
              -File .\scripts\publish_github_release.ps1 `
              -SummaryJson $env:RELEASE_SUMMARY_JSON `
              -OutputRoot $env:RELEASE_OUTPUT_ROOT `
              -Publish

      - name: Upload release publish output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-publish-output
          path: |
            output/release-assets/**
          if-no-files-found: warn
