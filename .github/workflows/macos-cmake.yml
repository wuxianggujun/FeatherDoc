name: macOS CMake CI

on:
  push:
    branches:
      - dev
      - master
  pull_request:
    branches:
      - dev
      - master
  workflow_dispatch:

jobs:
  minimal-build-test:
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -S . -B build-macos
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTING=ON
          -DBUILD_CLI=ON
          -DBUILD_SAMPLES=OFF

      - name: Build
        run: cmake --build build-macos --parallel

      - name: Run tests
        run: >
          ctest --test-dir build-macos
          --output-on-failure
          --timeout 60

      - name: Run split CLI smoke tests
        run: >
          ctest --test-dir build-macos
          --output-on-failure
          --timeout 60
          -L cli_smoke
