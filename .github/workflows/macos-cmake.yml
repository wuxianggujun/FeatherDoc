name: macOS CMake CI

on:
  push:
    branches:
      - dev
      - master
  pull_request:
    branches:
      - dev
      - master
  workflow_dispatch:

jobs:
  minimal-build-test:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure
        run: >
          cmake -S . -B build-macos
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTING=ON
          -DBUILD_CLI=ON
          -DBUILD_SAMPLES=OFF

      - name: Build
        timeout-minutes: 45
        run: |
          set -euo pipefail
          build_command="cmake --build build-macos --parallel 4 --verbose"
          echo "Starting ${build_command}"
          ${build_command} &
          build_pid=$!
          while kill -0 "${build_pid}" 2>/dev/null; do
            echo "Build heartbeat: ${build_command} is still running"
            sleep 60
          done &
          heartbeat_pid=$!
          set +e
          wait "${build_pid}"
          build_status=$?
          set -e
          kill "${heartbeat_pid}" 2>/dev/null || true
          wait "${heartbeat_pid}" 2>/dev/null || true
          exit "${build_status}"

      - name: Run tests
        run: ctest --test-dir build-macos --parallel 2 --output-on-failure --timeout 60

      - name: Run split CLI smoke tests
        run: ctest --test-dir build-macos --parallel 2 --output-on-failure --timeout 60 -L cli_smoke

      - name: Run release governance smoke tests
        run: ctest --test-dir build-macos --parallel 2 --output-on-failure --timeout 60 -L release_smoke

      - name: Upload release governance smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-governance-smoke-macos
          if-no-files-found: ignore
          path: |
            build-macos/test/release_candidate_blocker_rollup/**
            build-macos/test/release_candidate_governance_handoff/**
            build-macos/test/build_release_governance_handoff_report_aggregate/**
            build-macos/test/build_release_governance_pipeline_report_aggregate/**
