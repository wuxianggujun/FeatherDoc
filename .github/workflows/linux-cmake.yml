name: Linux CMake CI

on:
  push:
    branches:
      - dev
      - master
  pull_request:
    branches:
      - dev
      - master
  workflow_dispatch:

jobs:
  minimal-build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        compiler:
          - gcc
          - clang
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: >
          cmake -S . -B build-linux-${{ matrix.compiler }}
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTING=ON
          -DBUILD_CLI=ON
          -DBUILD_SAMPLES=OFF

      - name: Build
        run: cmake --build build-linux-${{ matrix.compiler }} --parallel

      - name: Run tests
        run: >
          ctest --test-dir build-linux-${{ matrix.compiler }}
          --output-on-failure
          --timeout 60

      - name: Run split CLI smoke tests
        run: >
          ctest --test-dir build-linux-${{ matrix.compiler }}
          --output-on-failure
          --timeout 60
          -L cli_smoke

      - name: Run release governance smoke tests
        run: >
          ctest --test-dir build-linux-${{ matrix.compiler }}
          --output-on-failure
          --timeout 60
          -L release_smoke

      - name: Upload release governance smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-governance-smoke-linux-${{ matrix.compiler }}
          if-no-files-found: ignore
          path: |
            build-linux-${{ matrix.compiler }}/test/release_candidate_blocker_rollup/**
            build-linux-${{ matrix.compiler }}/test/release_candidate_governance_handoff/**
            build-linux-${{ matrix.compiler }}/test/build_release_governance_handoff_report_aggregate/**
            build-linux-${{ matrix.compiler }}/test/build_release_governance_pipeline_report_aggregate/**
