name: Linux CMake CI

on:
  push:
    branches:
      - dev
      - master
  pull_request:
    branches:
      - dev
      - master
  workflow_dispatch:

jobs:
  minimal-build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        compiler:
          - gcc
          - clang
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: >
          cmake -S . -B build-linux-${{ matrix.compiler }}
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTING=ON
          -DBUILD_CLI=OFF
          -DBUILD_SAMPLES=OFF

      - name: Build
        run: cmake --build build-linux-${{ matrix.compiler }} --parallel

      - name: Run tests
        run: >
          ctest --test-dir build-linux-${{ matrix.compiler }}
          --output-on-failure
          --timeout 60
