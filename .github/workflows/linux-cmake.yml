name: Linux CMake CI

on:
  push:
    branches:
      - dev
      - master
  pull_request:
    branches:
      - dev
      - master
  workflow_dispatch:

jobs:
  minimal-build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    strategy:
      fail-fast: false
      matrix:
        compiler:
          - gcc
          - clang
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: >
          cmake -S . -B build-linux-${{ matrix.compiler }}
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTING=ON
          -DBUILD_CLI=ON
          -DBUILD_SAMPLES=OFF

      - name: Build
        timeout-minutes: 30
        run: |
          set -euo pipefail
          build_command="cmake --build build-linux-${{ matrix.compiler }} --parallel 4 --verbose"
          echo "Starting ${build_command}"
          ${build_command} &
          build_pid=$!
          while kill -0 "${build_pid}" 2>/dev/null; do
            echo "Build heartbeat: ${build_command} is still running"
            sleep 60
          done &
          heartbeat_pid=$!
          set +e
          wait "${build_pid}"
          build_status=$?
          set -e
          kill "${heartbeat_pid}" 2>/dev/null || true
          wait "${heartbeat_pid}" 2>/dev/null || true
          exit "${build_status}"

      - name: Run tests
        run: ctest --test-dir build-linux-${{ matrix.compiler }} --parallel 2 --output-on-failure --timeout 60

      - name: Run split CLI smoke tests
        run: ctest --test-dir build-linux-${{ matrix.compiler }} --parallel 2 --output-on-failure --timeout 60 -L cli_smoke

      - name: Run release governance smoke tests
        run: ctest --test-dir build-linux-${{ matrix.compiler }} --parallel 2 --output-on-failure --timeout 60 -L release_smoke

      - name: Upload release governance smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-governance-smoke-linux-${{ matrix.compiler }}
          if-no-files-found: ignore
          path: |
            build-linux-${{ matrix.compiler }}/test/release_candidate_blocker_rollup/**
            build-linux-${{ matrix.compiler }}/test/release_candidate_governance_handoff/**
            build-linux-${{ matrix.compiler }}/test/build_release_governance_handoff_report_aggregate/**
            build-linux-${{ matrix.compiler }}/test/build_release_governance_pipeline_report_aggregate/**
